# ===================================================================
# Nginx configuration for the React SPA.
#
# This is what enforces the architectural rule "the frontend only
# communicates with the BFF": the browser only ever hits this Nginx
# (port 80 on the host). Any request to /api/* is proxied to the BFF
# container on the internal Docker network. No other backend service
# is exposed to the browser.
# ===================================================================

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip for static assets
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Long-cache hashed assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API proxy — the ONLY backdoor. Strips the "/api" prefix so the
  # BFF sees its native routes (e.g. /auth/login, /feed, /stats/...).
  location /api/ {
    proxy_pass         http://bff:4000/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
  }

  # SPA fallback — client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health endpoint for load balancer / uptime checks
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
