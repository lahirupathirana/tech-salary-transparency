# ======================================================================
# Stats Service — Deployment
# ======================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats
  namespace: payfloor
  labels:
    app.kubernetes.io/name: stats
    app.kubernetes.io/part-of: payfloor
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stats
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: stats
        app.kubernetes.io/part-of: payfloor
    spec:
      containers:
        - name: stats
          image: ghcr.io/lahirupathirana/tst-stats:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4005
          env:
            - name: PORT
              value: "4005"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: payfloor-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payfloor-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: payfloor-secrets
                  key: POSTGRES_DB
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
          readinessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4005
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
