# ======================================================================
# Notification Service — ClusterIP Service
# ======================================================================
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: payfloor
  labels:
    app.kubernetes.io/name: notification
    app.kubernetes.io/part-of: payfloor
spec:
  type: ClusterIP
  selector:
    app: notification
  ports:
    - name: http
      port: 4006
      targetPort: 4006

