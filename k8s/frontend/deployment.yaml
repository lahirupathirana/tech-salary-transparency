# ======================================================================
# Frontend — Deployment (React SPA served by Nginx)
# ======================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: payfloor
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: payfloor
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: payfloor
    spec:
      containers:
        - name: frontend
          image: ghcr.io/lahirupathirana/tst-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
