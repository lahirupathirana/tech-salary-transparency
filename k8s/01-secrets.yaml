# ======================================================================
# Secrets — sensitive credentials for the PayFloor platform.
#
# ⚠️  DO NOT commit real secrets to source control.
#     Replace placeholder values before applying:
#
#   JWT_SECRET:
#     openssl rand -base64 48
#
#   POSTGRES_PASSWORD:
#     openssl rand -base64 24 | tr -d '/+='
#
#   Then apply:
#     kubectl apply -f k8s/01-secrets.yaml
#
# For production, consider using:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault Agent Injector
#   - Sealed Secrets (Bitnami)
# ======================================================================
apiVersion: v1
kind: Secret
metadata:
  name: payfloor-secrets
  namespace: payfloor
  labels:
    app.kubernetes.io/part-of: payfloor
type: Opaque
stringData:
  POSTGRES_USER: "tst_user"
  POSTGRES_PASSWORD: "CHANGE_ME_STRONG_PASSWORD"
  POSTGRES_DB: "tst_db"
  JWT_SECRET: "CHANGE_ME_STRONG_JWT_SECRET_MIN_32_CHARS"

